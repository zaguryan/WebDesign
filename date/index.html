<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cornell Move-In Countdown</title>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      padding: 0;
      font-family: 'EB Garamond', Garamond, serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;

      background: linear-gradient(-45deg, #b31b1b, #8a1515, #d44545, #7a0f0f);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 50px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0px);
      }
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .subtitle {
      font-size: 1.4rem;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    #countdown {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 1px;
      animation: fadeText 3s ease infinite alternate;
    }

    @keyframes fadeText {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    .cornell {
      font-size: 1rem;
      margin-top: 25px;
      opacity: 0.85;
    }

  </style>

</head>

<body>

<div class="container">
  <h1>🎓 Cornell Countdown</h1>
  <div class="subtitle">Move-In Day — August 17</div>
  <div id="countdown">Loading...</div>
  <div class="cornell">Ithaca, New York</div>
</div>

<script>

  const moveInDate = new Date("August 17, 2026 00:00:00").getTime();

  const countdown = setInterval(function() {

    const now = new Date().getTime();
    const distance = moveInDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
            days + " days • " +
            hours + " hours • " +
            minutes + " minutes • " +
            seconds + " seconds";

    if (distance < 0) {
      clearInterval(countdown);
      document.getElementById("countdown").innerHTML = "❤️ Welcome to Cornell ❤️";
    }

  }, 1000);

</script>

</body>
</html>
