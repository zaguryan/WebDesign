<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zac's Golf Word Hunt</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #173b20;
      background: linear-gradient(#8fd3ff 0 35%, #9ad46f 35% 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .game {
      width: 95%;
      max-width: 850px;
      background: rgba(255, 255, 255, 0.9);
      border: 4px solid #3f8c4c;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .hint {
      background: #f8ffe7;
      border: 2px solid #b8d978;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      gap: 4px;
      margin: 0 auto 18px;
      max-width: 650px;
    }

    .tile {
      aspect-ratio: 1;
      background: #fffdf0;
      border: 1px solid #aac36b;
      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
    }

    .found {
      background: #33a852;
      color: white;
    }

    input {
      padding: 12px;
      width: 260px;
      max-width: 90%;
      border: 2px solid #8bb65f;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #f2c94c;
      font-weight: bold;
      cursor: pointer;
      margin: 4px;
    }

    #message {
      font-weight: bold;
      min-height: 24px;
    }

    #foundList {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    #foundList li {
      background: #33a852;
      color: white;
      border-radius: 20px;
      padding: 7px 12px;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .tile {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
<div class="game">
  <h1>Zac's Golf Word Hunt</h1>

  <div class="hint">
    Hint: Zac's favorite Sunday activity
    <br>
    Score: <span id="score">0</span> / 15
  </div>

  <div class="board" id="board"></div>

  <input id="guess" placeholder="Type a golf word">
  <button onclick="checkWord()">Enter</button>
  <button onclick="resetGame()">Reset</button>

  <p id="message">Find the hidden golf words.</p>

  <h2>Found Words</h2>
  <ul id="foundList"></ul>
</div>

<script>
  const grid = [
    "AZCEGOLEAGLEFNZ",
    "ACRSUNDATYLINIK",
    "BOGEYSRCEOUGHPH",
    "FAZARDYAEPINSSW",
    "INDGCAODBURESKE",
    "HOLRWECDOUNIPCG",
    "SFLRIAGIXAWDEAR",
    "DAIGEVIEGRORNBE",
    "AANZCGEIORLIFZE",
    "FACDSULRNDOBAYN",
    "LINKTLSROUGUHHA",
    "ZARDURPUTTERGPI",
    "NSWMINAGCOURSHE",
    "HOLECUPPFLAGWED",
    "GESUOHBULCEIRON"
  ];

  const words = {
    CLUBHOUSE: [219, 218, 217, 216, 215, 214, 213, 212, 211],
    MULLIGAN: [183, 169, 155, 141, 127, 113, 99, 85],
    SANDTRAP: [90, 106, 122, 138, 154, 170, 186, 202],
    BACKSPIN: [118, 103, 88, 73, 58, 43, 28, 13],
    FAIRWAY: [135, 121, 107, 93, 79, 65, 51],
    BIRDIE: [146, 131, 116, 101, 86, 71],
    PUTTER: [171, 172, 173, 174, 175, 176],
    DRIVER: [62, 78, 94, 110, 126, 142],
    CADDIE: [37, 52, 67, 82, 97, 112],
    TEEBOX: [23, 38, 53, 68, 83, 98],
    BOGEY: [30, 31, 32, 33, 34],
    EAGLE: [7, 8, 9, 10, 11],
    GREEN: [89, 104, 119, 134, 149],
    ROUGH: [129, 145, 161, 177, 193],
    FORE: [45, 31, 17, 3]
  };

  const board = document.getElementById("board");
  const guess = document.getElementById("guess");
  const message = document.getElementById("message");
  const score = document.getElementById("score");
  const foundList = document.getElementById("foundList");
  const foundWords = [];

  for (let row = 0; row < grid.length; row++) {
    for (let col = 0; col < grid[row].length; col++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.id = "tile" + (row * 15 + col);
      tile.textContent = grid[row][col];
      board.appendChild(tile);
    }
  }

  guess.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      checkWord();
    }
  });

  function checkWord() {
    const word = guess.value.toUpperCase().replaceAll(" ", "");

    if (words[word] && !foundWords.includes(word)) {
      foundWords.push(word);
      message.textContent = "Correct! You found " + word + ".";
      score.textContent = foundWords.length;

      for (let i = 0; i < words[word].length; i++) {
        document.getElementById("tile" + words[word][i]).classList.add("found");
      }

      const newWord = document.createElement("li");
      newWord.textContent = word;
      foundList.appendChild(newWord);

      if (foundWords.length === 15) {
        message.textContent = "You found them all. Sunday golf victory!";
      }
    } else if (foundWords.includes(word)) {
      message.textContent = "You already found that word.";
    } else {
      message.textContent = "Try again.";
    }

    guess.value = "";
    guess.focus();
  }

  function resetGame() {
    foundWords.length = 0;
    score.textContent = 0;
    foundList.innerHTML = "";
    message.textContent = "Find the hidden golf words.";
    guess.value = "";

    const tiles = document.querySelectorAll(".tile");
    for (let i = 0; i < tiles.length; i++) {
      tiles[i].classList.remove("found");
    }
  }
</script>
</body>
</html>
