<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to Zac's World</title>

    <style>

        body{
            background-color: darkseagreen;
            font-family: "Courier New", monospace;
        }

        h1{
            font-size:40px;
            color:orangered;
            text-align:center;
            position:relative;
            animation:headerSlide 6s ease-in-out infinite alternate;
            transition:all .4s ease;
        }

        h1:hover{
            color:blueviolet;
            text-shadow:0 0 10px violet,0 0 20px violet;
            transform:scale(1.05);
        }

        @keyframes headerSlide{
            from{left:-20px;}
            to{left:20px;}
        }

        h2{
            color:blueviolet;
            animation:growShrink 3s infinite alternate, colorShift 6s infinite alternate;
        }

        @keyframes growShrink{
            from{font-size:20px;}
            to{font-size:40px;}
        }

        /* COLOR ANIMATION FOR TEXT */

        @keyframes colorShift{
            0%{color:blueviolet;}
            50%{color:mediumorchid;}
            100%{color:deeppink;}
        }

        h3{
            color:deeppink;
            transition:color .5s;
        }

        h3:hover{
            color:orangered;
        }

        .otherpages{
            color:navajowhite;
        }

        /* image spacing */

        img{
            margin:20px 0;
        }

        /* COOL LINK STYLING */

        a{
            color:navy;
            text-decoration:none;
            font-weight:bold;
            padding:6px 10px;
            border-radius:6px;
            position:relative;
            overflow:hidden;
            transition:all .3s ease;
        }

        a::before{
            content:"";
            position:absolute;
            top:0;
            left:-100%;
            width:100%;
            height:100%;
            background:linear-gradient(120deg, transparent, rgba(255,255,255,.6), transparent);
            transition:all .5s;
        }

        a:hover{
            color:white;
            background-color:orangered;
            box-shadow:0 0 8px orangered, 0 0 16px orangered;
        }

        a:hover::before{
            left:100%;
        }

        ul{
            list-style-position:inside;
        }

        li{
            margin:8px 0;
        }

    </style>
</head>
